server {
    listen 80;
    server_name localhost;

    # Đường dẫn chứa source code đã build của Vite
    root /usr/share/nginx/html;
    index index.html;

    # Cấu hình cực kỳ quan trọng cho SPA (React/Vue/Angular)
    # Giúp ứng dụng không bị lỗi 404 khi người dùng F5/Refresh trang
    location / {
        try_files $uri $uri/ /index.html;
    }

    # (Tùy chọn) Bật cache cho các file tĩnh giúp web load nhanh hơn ở phía client
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|otf|ttf|svg|mp4|webm)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}